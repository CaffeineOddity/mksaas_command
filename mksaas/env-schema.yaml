# MkSaaS 环境变量全集 schema
#
# 用途：本文件是环境变量的唯一真相来源（single source of truth）。
#   - CLI 运行时加载本文件，作为 env 命令采集字段与 apply 全量重建 .env.* 的变量全集基线
#   - docs/env-groups/*.md 描述采集流程与校验规则，变量清单以本文件为准；冲突时以本文件为准
#
# 字段约定（每个变量）：
#   required:           是否必填。apply 在全量重建前校验：必填且空值则拦截
#   test_default:       test profile 默认值。未采集时采集预填与 apply 重建取此值
#   prod_default:       prod profile 默认值。未采集时采集预填与 apply 重建取此值
#   generate_if_empty:  空值时是否在 apply 阶段自动生成（仅 BETTER_AUTH_SECRET 等少数密钥）
#   sensitive:          是否敏感字段。采集时隐藏输入，终端输出做摘要
#   description:        变量用途说明（中文）
#
# group 标识符规范见 REQUIREMENTS.md §5.2：
#   - group key 使用下划线形式（如 github_oauth），与 CLI 命令的连字符形式（github-oauth）一一映射
#   - 遍历顺序固定为下方 01~17 的顺序

groups:
